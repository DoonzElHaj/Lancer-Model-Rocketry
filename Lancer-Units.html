<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lancer Model Rocketry - Units</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Oxygen', sans-serif;
      background-color: #f4f4f4;
    }
    
    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgb(168, 12, 12);
      padding: 15px 30px;
    }
    .navbar .logo {
      color: #fff;
      font-size: 22px;
      font-weight: bold;
    }
    .navbar .links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
    }
    .navbar .links a:hover {
      text-decoration: underline;
    }

    /* Units Section */
    .units {
      max-width: 1000px;
      margin: 50px auto;
      text-align: center;
    }
    .units h1 {
      color: rgb(168, 12, 12);
      font-size: 36px;
      margin-bottom: 20px;
    }
    .units p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
    }

    /* Unit Card Links */
    .unit-card {
      display: inline-block;
      width: 250px;
      margin: 15px;
      padding: 20px;
      background: white;
      border: 2px solid rgb(168, 12, 12);
      border-radius: 8px;
      transition: 0.3s ease;
      text-decoration: none; /* removes underline */
      color: inherit; /* keeps text color consistent */
    }
    .unit-card:hover {
      background-color: #f9f9f9;
      transform: scale(1.05);
    }

      /* Back Button */
    .back-btn {
      background-color: white;
      color: rgb(168, 12, 12);
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s ease;
    }
    .back-btn:hover {
      background-color: #ddd;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">
      Lancer Model Rocketry
      <button onclick="history.back()" class="back-btn">Prev Page</button>
    </div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="Lancer-Projects.html">Projects</a>
      <a href="Lancer-Contacts.html">Contact</a>
      <a href="Lancer-Upcoming.html">Upcoming Projects</a>
    </div>
  </div>

  <!-- Units Section -->
  <div class="units">
    <h1>Units used in or in development the Lancer Series</h1>
    <p>Units in the works or we have planned</p>

    <a href="LrFs-1.html" class="unit-card">
      <h2><strong>Unit:</strong> LrFs-1</h2>
      <p><strong>Status:</strong> In Development</p>
      <p><strong>Type:</strong> Flight System</p>
      <p>Click for details</p>
    </a>
  </div>
</body>
</html>
