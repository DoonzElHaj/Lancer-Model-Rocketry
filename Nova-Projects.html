<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Model Rocketry - Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Oxygen', sans-serif;
      background-color: #f4f4f4;
    }
    
    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgb(168, 12, 12);
      padding: 15px 30px;
    }
    .navbar .logo {
      color: #fff;
      font-size: 22px;
      font-weight: bold;
    }
    .navbar .links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
    }
    .navbar .links a:hover {
      text-decoration: underline;
    }

    /* Projects Section */
    .projects {
      max-width: 1000px;
      margin: 50px auto;
      text-align: center;
    }
    .projects h1 {
      color: rgb(168, 12, 12);
      font-size: 36px;
      margin-bottom: 20px;
    }
    .projects p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
    }
    .project-card {
      display: inline-block;
      width: 250px;
      margin: 15px;
      padding: 20px;
      background: white;
      border: 2px solid rgb(168, 12, 12);
      border-radius: 8px;
      transition: 0.3s ease;
    }
    .project-card:hover {
      background-color: #f9f9f9;
      transform: scale(1.05);
    }
    /* Back Button */
    .back-btn {
      background-color: white;
      color: rgb(168, 12, 12);
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s ease;
    }
    .back-btn:hover {
      background-color: #ddd;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">
      Nova Model Rocketry
      <button onclick="history.back()" class="back-btn">⬅ Prev Page</button>
    </div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="Nova-Projects.html">Projects</a>
      <a href="Nova-Contacts.html">Contact</a>
      <a href="Nova-Upcoming.html">Upcoming Projects</a>
    </div>
  </div>


  <!-- Projects Section -->
  <div class="projects">
    <h1>Our Projects</h1>
    <p>No Projects Yet</p>

    <div class="project-card">
      <h2>Rocket Alpha</h2>
      <p>N/a</p>
    </div>

    <div class="project-card">
      <h2>Rocket Beta</h2>
      <p>N/a</p>
    </div>

    <div class="project-card">
      <h2>Rocket Charlie</h2>
      <p>N/a</p>
    </div>
  </div>
</body>
</html>
