<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lancer Model Aviation - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Oxygen', sans-serif;
      background-color: #f4f4f4;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgb(168, 12, 12);
      padding: 15px 30px;
    }
    .navbar .logo {
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 15px; /* space between logo and button */
    }
    .navbar .links a {
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
    }
    .navbar .links a:hover {
      text-decoration: underline;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(to right, #a00, #600);
      color: white;
    }
    .hero h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .hero p {
      font-size: 20px;
      margin-bottom: 30px;
    }
    .hero .buttons a button {
      background-color: white;
      color: rgb(168, 12, 12);
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      margin: 10px;
    }
    .hero .buttons a button:hover {
      background-color: #ddd;
    }

    /* Back Button */
    .back-btn {
      background-color: white;
      color: rgb(168, 12, 12);
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s ease;
    }
    .back-btn:hover {
      background-color: #ddd;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">
      Lancer Model Aviation
      <button onclick="history.back()" class="back-btn">⬅ Prev Page</button>
    </div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="Lancer-Projects.html">Projects</a>
      <a href="Lancer-Contacts.html">Contact</a>
      <a href="Lancer-Upcoming.html">Upcoming Projects</a>
      <a href="Lancer-Units.html">Units</a>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Lancer Model Aviation</h1>
    <p>Beginning Model Aviation</p>
    <div class="buttons">
      <a href="Lancer-Projects.html"><button>See Projects</button></a>
      <a href="Lancer-Contacts.html"><button>Join Us</button></a>
      <a href="Lancer-Upcoming.html"><button>Upcoming Projects</button></a>
    </div>
  </div>
</body>
</html>
